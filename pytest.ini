[pytest]
testpaths = backend/tests

python_files = test_*.py

python_functions = test_*

pythonpath = .
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=backend/app/core
    --cov-report=html
    --cov-report=term-missing

markers =
    unit: Tests unitaires
    integration: Tests d integration
    slow: Tests lents